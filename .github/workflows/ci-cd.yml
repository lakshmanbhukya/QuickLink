name: QuickLink CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Build Spring Boot Server with Maven
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Server with Maven
        run: |
          cd QuickLink-Server
          mvn clean package -DskipTests -B

      - name: Discord Notification (Server Build)
        if: success() && secrets.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "QuickLink Server Build Passed"
          description: "Spring Boot server Maven build completed successfully on ${{ github.ref_name }}."
          color: 0x00ff00

  # 2. Verify React Client Production Build (No Docker Image)
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: QucikLink-Client/package-lock.json

      - name: Install Dependencies & Verify Build
        run: |
          cd QucikLink-Client
          npm ci
          npm run build

      - name: Discord Notification (Client Build)
        if: success() && secrets.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "QuickLink Client Build Passed"
          description: "React client production build completed successfully on ${{ github.ref_name }}."
          color: 0x00ff00

  # 3. Build & Push Server Docker Image to Docker Hub + Trigger Render Deploy Hook
  release-server:
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./QuickLink-Server
          file: ./QuickLink-Server/Dockerfile
          push: true
          tags: |
            lakshmanbhukya/quicklink-server:latest
            lakshmanbhukya/quicklink-server:${{ github.sha }}

      - name: Trigger Render Deploy Hook
        if: success() && secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Discord Notification (Server Image Pushed)
        if: success() && secrets.DISCORD_WEBHOOK != ''
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Server Image Pushed to Docker Hub"
          description: "lakshmanbhukya/quicklink-server successfully pushed and deployed on Render."
          color: 0x0000ff
