spring.application.name=QuickLink
spring.config.import=optional:file:.env[.properties]

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

 #Hibernate Settings
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Automatically create/update tables on startup
spring.jpa.hibernate.ddl-auto=validate

# Show generated SQL queries in the console
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=${REDIS_URL}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}